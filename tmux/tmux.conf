# Set colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Allow mouse interaction
set -g mouse on

# Allow clipboard integration
set -g set-clipboard on

# Set Ctrl+Space as prefix
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Vim-like pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# V - split vertical
unbind %
bind v split-window -h -c "#{pane_current_path}"

# S - split horizontal
unbind '"'
bind s split-window -v -c "#{pane_current_path}"

# R - reload config
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

# Change from 0 based to 1 based
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-q send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+Shift+hjkl to resize panes
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Toggle bar
bind b set -g status

# Statusbar
set -g status-left " #S  "
set -g window-status-format "  #I:#W  "
set -g window-status-current-format " [#I:#W] "
set -g status-style "fg=cyan bg=black"
set -g window-status-current-style "fg=black bg=cyan bold"
set -g status-right "%d/%m - %H:%M "
set -g status-justify absolute-centre

